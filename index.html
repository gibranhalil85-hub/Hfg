<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>https://www.effectivecpmnetwork.com/vpmzu7y0ik?key=4e342d70f464a4475e343865b5f71c17</title>
  <meta name="description" content="dyreclink - Fast, clean, and reliable link tools">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 700px;
      text-align: center;
    }
    
    h1 {
      font-size: 3rem;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #58a6ff, #1f6feb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    p {
      font-size: 1.2rem;
      color: #8b949e;
      margin-bottom: 32px;
    }
    
    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    a.btn {
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }
    
    .btn-primary {
      background: #238636;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2ea043;
    }
    
    .btn-outline {
      border: 1px solid #30363d;
      color: #c9d1d9;
    }
    
    .btn-outline:hover {
      background: #21262d;
    }
    
    footer {
      margin-top: 60px;
      font-size: 0.9rem;
      color: #6e7681;
    }
    
    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>dyreclink</h1>
    <p>Fast, clean, and reliable tools for your links. Open source & free.</p>
    
    <div class="btn-group">
      <a href="https://github.com/USERNAME/dyreclink" class="btn btn-primary">View on GitHub</a>
      <a href="#docs" class="btn btn-outline">Documentation</a>
    </div>
    
    <footer>
      © 2026 dyreclink. Built with GitHub Pages.
    </footer>
  </div>
</body>
</html>
